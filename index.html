<!DOCTYPE html>
<html lang="en">
<!--    ﹏﹏﹏⊹ ࣪ ﹏𓊝﹏𓂁﹏⊹ ﹏﹏﹏⊹ ࣪ ˖ ˖-->

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>🪸 Dor's ASCuarium 🐠🫧</title>

  <!-- Icon for Tab Browser : -->
  <link rel="icon" type="image/png" href="images/favicon.ico" />

  <!-- Main project stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- PART 01: FULL PAGE AQUARIUM BACKGROUND
       ---------------------------------------------------------
       No wrapper. No frame. No card.
       The aquarium is the full page. -->

  <section id="aquarium" class="aquarium" aria-label="Full page animated ASCII aquarium">
    <!-- JavaScript injects all fish, bubbles, seaweed and layers here. -->
  </section>

  <!-- PART 02: SETTINGS BUTTON -->
  <button id="settingsToggle" class="settings-toggle" type="button">
    ⚙
  </button>

  <!-- PART 03: SETTINGS POPUP -->
  <aside id="settingsPanel" class="settings-panel" aria-label="Aquarium settings panel">
    <div class="settings-header">
      <h2>Aquarium Settings</h2>
      <button id="closeSettings" class="close-btn" type="button" aria-label="Close settings">

      </button>
    </div>

    <details id="fishSettingsSection" open>
      <summary>🐠 Fish</summary>
      <!-- fish controls -->

      <label class="control-row">
        Fish Amount
        <input id="fishAmount" type="range" min="1" max="40" value="12" />
        <span id="fishAmountValue" class="value-pill">12</span>
      </label>

      <label class="control-row">
        Fish Variety
        <input id="fishVariety" type="range" min="1" max="25" value="15" />
        <span id="fishVarietyValue" class="value-pill">15</span>
      </label>

      <!-- Puffer sliders (spawn timing) -->
      <details class="settings-sector" open>
        <summary>🐡 Puffer Settings</summary>

        <label class="control-row">
          Puffer Spawn Delay
          <input id="pufferSpawnDelay" type="range" min="0" max="20" value="0" />
          <span id="pufferSpawnDelayValue" class="value-pill">0s</span>
        </label>

        <label class="control-row">
          Puffer Inflate Delay
          <input id="pufferInflateDelay" type="range" min="1" max="10" value="4" />
          <span id="pufferInflateDelayValue" class="value-pill">4s</span>
        </label>
      </details>

      <details class="fish-picker">
        <summary>🐠 Choose Fish Types</summary>

        <div id="fishToggleList" class="fish-toggle-list">
          <!-- JavaScript will inject fish checkboxes here -->
        </div>
      </details>

      <!-- Shark Slider -->
      <label class="control-row">
        Shark Amount
        <input id="sharkAmount" type="range" min="0" max="5" value="1" />
        <span id="sharkAmountValue" class="value-pill">1</span>
      </label>

      <label class="control-row">
        Speed
        <input id="speedControl" type="range" min="1" max="500" value="100" />
        <span id="speedControlValue" class="value-pill">100%</span>
      </label>

    </details>

    <!-- Space --><br><!-- Space -->

    <details id="backgroundSettingsSection" open>
      <summary>🌊 Background</summary>
      <!-- environment controls -->

      <label class="control-row">
        Bubble Amount
        <input id="bubbleAmount" type="range" min="5" max="100" value="36" />
        <span id="bubbleAmountValue" class="value-pill">36</span>
      </label>

      <label class="control-row">
        Seaweed Amount
        <input id="seaweedAmount" type="range" min="2" max="20" value="8" />
        <span id="seaweedAmountValue" class="value-pill">8</span>
      </label>

      <label class="control-row">
        Depth Strength
        <input id="depthStrength" type="range" min="0" max="100" value="65" />
        <span id="depthStrengthValue" class="value-pill">65</span>
      </label>


      <label class="control-row">
        Water Tone
        <input id="waterTone" type="range" min="0" max="100" value="45" />
        <span id="waterToneValue" class="value-pill">45</span>
      </label>

    </details>

    <!-- EXPERIMENTAL TAB: -->
    
    <!--
    livingFishAmount
    livingFishColorMode
    livingFishBehavior
    -->

    <!-- Buttons for Apply / Reset :-->
    <details id="experimentalSettingsSection" class="settings-sector">
      <summary>🧪 Experimental</summary>

      <label class="control-row">
        Living Fish Amount
        <input id="livingFishAmount" type="range" min="0" max="10" value="1" />
        <span id="livingFishAmountValue" class="value-pill">1</span>
      </label>
    </details>

    <!-- Space --><br><!-- Space -->

    <div class="settings-actions">
      <button id="applySettings" class="panel-btn" type="button">Apply</button>
      <button id="resetSettings" class="panel-btn ghost" type="button">Reset</button>
    </div>

    <p class="settings-note">
      The sliders are working: apply changes to regenerate the aquarium background.
    </p>
  </aside>

  <!-- Main project script -->
  <script src="script.js"></script>
</body>

</html>
